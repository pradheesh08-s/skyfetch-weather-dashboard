<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyFetch - Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🌤️ SkyFetch</h1>
        <p class="tagline">Your Personal Weather Dashboard</p>

        <form id="weather-form" class="search-form" novalidate>
            <label for="city-input" class="sr-only">City name</label>
            <input
                type="text"
                id="city-input"
                name="city"
                placeholder="Enter a city name"
                autocomplete="off"
                required
            >
            <button type="submit" id="search-btn">Search</button>
        </form>

        <p id="status-message" class="status-message" aria-live="polite"></p>

        <section class="recent-searches-section" aria-label="Recent city searches">
            <div class="recent-searches-header">
                <h2 class="recent-searches-title">Recent Searches</h2>
                <button type="button" id="clear-recent-btn" class="clear-recent-btn">Clear</button>
            </div>
            <p class="recent-searches-hint">Shortcut: Ctrl + Alt + 1-6 to search saved cities.</p>
            <div id="recent-searches" class="recent-searches" aria-live="polite"></div>
        </section>
        
        <div id="weather-display">
            <p class="loading">Search for a city to see the weather.</p>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
